<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ESTA — Недвижимость Тирасполя</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
<style>
:root {
  --ink:    #0e0f11;
  --ink2:   #16181c;
  --ink3:   #1e2128;
  --card:   #22262e;
  --sand:   #c8b89a;
  --sand2:  #e8d9c4;
  --text:   #ece8e1;
  --muted:  #7a7870;
  --green:  #4ade80;
  --red:    #f87171;
  --border: rgba(200,184,154,0.14);
  --glow:   0 0 40px rgba(200,184,154,0.1);
  --r:      14px;
}
*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
html { scroll-behavior: smooth; }
body { font-family:'DM Sans',sans-serif; background:var(--ink); color:var(--text); overflow-x:hidden; }

/* ── SCROLLBAR ── */
::-webkit-scrollbar { width:6px; }
::-webkit-scrollbar-track { background:var(--ink2); }
::-webkit-scrollbar-thumb { background:var(--ink3); border-radius:3px; }

/* ── HEADER ── */
.header {
  position:fixed; top:0; left:0; right:0; z-index:100;
  height:64px;
  background:rgba(14,15,17,0.88);
  backdrop-filter:blur(16px);
  border-bottom:1px solid var(--border);
  display:flex; align-items:center;
  padding:0 32px; gap:32px;
}
.logo {
  font-family:'Cormorant Garamond',serif;
  font-size:26px; font-weight:600;
  color:var(--sand); letter-spacing:2px;
  white-space:nowrap;
}
.logo sub { font-size:11px; color:var(--muted); letter-spacing:3px; font-style:normal; vertical-align:middle; margin-left:4px; }
.header-nav { display:flex; gap:24px; margin-left:8px; }
.header-nav a {
  color:var(--muted); font-size:13px; font-weight:500;
  text-decoration:none; transition:color .2s;
}
.header-nav a:hover { color:var(--text); }
.header-spacer { flex:1; }
.header-search {
  display:flex; align-items:center; gap:8px;
  background:var(--ink3); border:1px solid var(--border);
  border-radius:8px; padding:6px 12px;
  min-width:240px;
}
.header-search input {
  background:none; border:none; color:var(--text);
  font-family:'DM Sans',sans-serif; font-size:13px;
  outline:none; width:100%;
}
.header-search input::placeholder { color:var(--muted); }
.btn-fav-toggle {
  position:relative;
  background:var(--ink3); border:1px solid var(--border);
  color:var(--muted); padding:8px 14px;
  border-radius:8px; font-size:13px; cursor:pointer;
  font-family:'DM Sans',sans-serif;
  transition:all .2s; white-space:nowrap;
}
.btn-fav-toggle:hover { border-color:var(--sand); color:var(--sand); }
.fav-count {
  position:absolute; top:-6px; right:-6px;
  background:var(--sand); color:var(--ink);
  font-size:10px; font-weight:700;
  width:18px; height:18px; border-radius:50%;
  display:none; align-items:center; justify-content:center;
}
.fav-count.show { display:flex; }

/* ── HERO ── */
.hero {
  min-height:100vh; display:flex; align-items:center;
  position:relative; overflow:hidden;
  padding:80px 32px 60px;
}
.hero-bg {
  position:absolute; inset:0;
  background:
    radial-gradient(ellipse 70% 60% at 60% 40%, rgba(200,184,154,0.07) 0%, transparent 70%),
    linear-gradient(160deg, rgba(14,15,17,0.97) 0%, rgba(30,33,40,0.9) 50%, rgba(14,15,17,0.97) 100%),
    url('https://images.unsplash.com/photo-1600596542815-ffad4c1539a9?w=1600') center/cover;
}
.hero-noise {
  position:absolute; inset:0; opacity:.03;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
}
.hero-content { position:relative; z-index:1; max-width:700px; }
.hero-eyebrow {
  display:inline-flex; align-items:center; gap:8px;
  border:1px solid var(--border); border-radius:20px;
  padding:5px 16px; margin-bottom:28px;
  font-size:11px; letter-spacing:2px; text-transform:uppercase; color:var(--sand);
}
.hero-dot { width:6px; height:6px; border-radius:50%; background:var(--green); animation:blink 2s infinite; }
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:.3} }
.hero h1 {
  font-family:'Cormorant Garamond',serif;
  font-size:clamp(48px,7vw,84px); font-weight:400;
  line-height:1.05; margin-bottom:24px; color:#fff;
}
.hero h1 em { font-style:italic; color:var(--sand); }
.hero-desc { font-size:16px; color:var(--muted); line-height:1.8; margin-bottom:40px; font-weight:300; max-width:500px; }

/* ── SEARCH PANEL ── */
.search-panel {
  background:rgba(22,24,28,0.85);
  border:1px solid var(--border);
  border-radius:var(--r);
  padding:20px;
  backdrop-filter:blur(12px);
  box-shadow:var(--glow);
  display:grid;
  grid-template-columns:1fr 1fr 1fr 1fr auto;
  gap:10px;
  align-items:end;
  max-width:820px;
}
.sp-group label {
  display:block; font-size:10px; text-transform:uppercase;
  letter-spacing:1.5px; color:var(--muted); margin-bottom:7px;
}
.sp-input, .sp-select {
  width:100%;
  background:var(--ink3); border:1px solid rgba(255,255,255,0.06);
  color:var(--text); padding:11px 14px;
  border-radius:9px; font-family:'DM Sans',sans-serif; font-size:13px;
  outline:none; transition:border-color .2s;
}
.sp-input:focus, .sp-select:focus { border-color:var(--sand); }
.sp-input::placeholder { color:var(--muted); }
.sp-select option { background:var(--ink2); }
.sp-btn {
  background:var(--sand); color:var(--ink);
  border:none; padding:12px 28px; border-radius:9px;
  font-family:'DM Sans',sans-serif; font-size:14px; font-weight:600;
  cursor:pointer; transition:all .2s; white-space:nowrap;
}
.sp-btn:hover { background:var(--sand2); transform:scale(1.02); }

/* ── MAIN LAYOUT ── */
.page-body { padding-top:64px; }
.section { padding:60px 32px; }
.section-title {
  font-family:'Cormorant Garamond',serif;
  font-size:38px; font-weight:400; margin-bottom:8px;
}
.section-title em { font-style:italic; color:var(--sand); }
.section-sub { color:var(--muted); font-size:14px; margin-bottom:32px; }

/* ── VIEW TOGGLE ── */
.view-row {
  display:flex; align-items:center; gap:10px;
  margin-bottom:24px; flex-wrap:wrap;
}
.view-btn {
  padding:8px 14px; border-radius:8px; border:1px solid var(--border);
  background:transparent; color:var(--muted);
  font-family:'DM Sans',sans-serif; font-size:12px; font-weight:500;
  cursor:pointer; transition:all .2s;
}
.view-btn.active, .view-btn:hover { border-color:var(--sand); color:var(--sand); background:rgba(200,184,154,.07); }
.results-count { margin-left:auto; font-size:13px; color:var(--muted); }
.sort-sel {
  background:var(--ink3); border:1px solid var(--border);
  color:var(--text); padding:8px 12px; border-radius:8px;
  font-family:'DM Sans',sans-serif; font-size:12px; outline:none; cursor:pointer;
}
.sort-sel option { background:var(--ink2); }

/* ── FILTERS SIDEBAR ── */
.listings-layout { display:grid; grid-template-columns:260px 1fr; gap:28px; }
.filters-panel {
  background:var(--ink2); border:1px solid var(--border);
  border-radius:var(--r); padding:24px; height:fit-content;
  position:sticky; top:80px;
}
.fp-title { font-size:13px; font-weight:600; margin-bottom:20px; text-transform:uppercase; letter-spacing:1px; color:var(--sand); }
.fp-group { margin-bottom:20px; }
.fp-label { font-size:11px; text-transform:uppercase; letter-spacing:1.5px; color:var(--muted); margin-bottom:10px; display:block; }
.fp-input, .fp-select {
  width:100%; background:var(--ink3); border:1px solid rgba(255,255,255,0.06);
  color:var(--text); padding:9px 12px; border-radius:8px;
  font-family:'DM Sans',sans-serif; font-size:13px; outline:none; transition:border-color .2s;
}
.fp-input:focus, .fp-select:focus { border-color:var(--sand); }
.fp-input::placeholder { color:var(--muted); }
.fp-select option { background:var(--ink2); }
.fp-row { display:grid; grid-template-columns:1fr 1fr; gap:8px; }
.fp-chips { display:flex; flex-wrap:wrap; gap:6px; }
.fp-chip {
  padding:5px 12px; border-radius:20px; border:1px solid var(--border);
  background:transparent; color:var(--muted);
  font-family:'DM Sans',sans-serif; font-size:12px; cursor:pointer; transition:all .2s;
}
.fp-chip:hover, .fp-chip.on { border-color:var(--sand); color:var(--sand); background:rgba(200,184,154,.08); }
.fp-reset {
  width:100%; background:transparent; border:1px solid var(--border);
  color:var(--muted); padding:9px; border-radius:8px;
  font-family:'DM Sans',sans-serif; font-size:12px; cursor:pointer; transition:all .2s;
  margin-top:4px;
}
.fp-reset:hover { border-color:var(--red); color:var(--red); }

/* ── CARDS GRID ── */
.cards-grid {
  display:grid;
  grid-template-columns:repeat(auto-fill, minmax(280px, 1fr));
  gap:20px;
}
.cards-grid.list-view { grid-template-columns:1fr; }

.card {
  background:var(--card); border:1px solid rgba(255,255,255,0.05);
  border-radius:var(--r); overflow:hidden;
  transition:transform .25s, border-color .25s, box-shadow .25s;
  animation:fadeUp .4s ease both;
  position:relative;
}
.card:hover { transform:translateY(-5px); border-color:var(--border); box-shadow:0 20px 50px rgba(0,0,0,.5); }
@keyframes fadeUp { from{opacity:0;transform:translateY(16px)} to{opacity:1;transform:none} }

.card-vip::after {
  content:'VIP';
  position:absolute; top:12px; left:12px;
  background:linear-gradient(135deg, var(--sand), var(--sand2));
  color:var(--ink); font-size:9px; font-weight:700;
  letter-spacing:1.5px; padding:3px 9px; border-radius:4px;
}

.card-img {
  height:190px; overflow:hidden; position:relative; background:var(--ink3);
}
.card-img img { width:100%; height:100%; object-fit:cover; transition:transform .4s; }
.card:hover .card-img img { transform:scale(1.06); }

.card-fav {
  position:absolute; top:10px; right:10px;
  width:32px; height:32px; border-radius:50%;
  background:rgba(14,15,17,.75); border:1px solid rgba(255,255,255,.12);
  display:flex; align-items:center; justify-content:center;
  font-size:14px; cursor:pointer; transition:all .2s;
  backdrop-filter:blur(4px); z-index:2;
}
.card-fav:hover { border-color:var(--red); }
.card-fav.on { color:var(--red); border-color:var(--red); background:rgba(248,113,113,.15); }

.card-type-badge {
  position:absolute; bottom:10px; left:10px;
  background:rgba(14,15,17,.82); border:1px solid rgba(255,255,255,.1);
  color:var(--text); font-size:11px; font-weight:500;
  padding:3px 10px; border-radius:5px; backdrop-filter:blur(4px);
}

.card-body { padding:16px 18px 18px; }
.card-title {
  font-family:'Cormorant Garamond',serif; font-size:19px; font-weight:600;
  color:#fff; margin-bottom:8px; line-height:1.2;
  white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
}
.card-meta { display:flex; gap:14px; font-size:12px; color:var(--muted); margin-bottom:14px; flex-wrap:wrap; }
.card-price {
  font-size:22px; font-weight:600; color:var(--sand);
  font-family:'Cormorant Garamond',serif;
}
.card-price-rub { font-size:12px; color:var(--muted); margin-top:2px; }
.card-footer { margin-top:14px; display:flex; gap:8px; }
.card-btn {
  flex:1; padding:10px; border-radius:8px; border:1px solid var(--border);
  background:transparent; color:var(--sand);
  font-family:'DM Sans',sans-serif; font-size:12px; font-weight:600;
  cursor:pointer; transition:all .2s;
}
.card-btn:hover { background:var(--sand); color:var(--ink); border-color:var(--sand); }
.card-btn.secondary { color:var(--muted); }
.card-btn.secondary:hover { background:var(--ink3); border-color:rgba(255,255,255,.1); color:var(--text); }

/* List view card */
.cards-grid.list-view .card { display:flex; }
.cards-grid.list-view .card-img { width:240px; height:auto; flex-shrink:0; }
.cards-grid.list-view .card-body { flex:1; display:flex; flex-direction:column; justify-content:space-between; }

/* ── MAP ── */
#map { height:480px; border-radius:var(--r); overflow:hidden; border:1px solid var(--border); }
.leaflet-container { background:#1a1d23 !important; }

/* ── PERSONAL CABINET ── */
.cabinet {
  background:var(--ink2); border:1px solid var(--border);
  border-radius:var(--r); padding:32px;
}
.cab-tabs { display:flex; gap:4px; margin-bottom:28px; }
.cab-tab {
  padding:8px 20px; border-radius:8px; border:none;
  background:transparent; color:var(--muted);
  font-family:'DM Sans',sans-serif; font-size:13px; font-weight:500;
  cursor:pointer; transition:all .2s;
}
.cab-tab.active { background:rgba(200,184,154,.12); color:var(--sand); }
.cab-tab:hover:not(.active) { color:var(--text); }

/* ── LEAD FORM MODAL ── */
.overlay {
  display:none; position:fixed; inset:0;
  background:rgba(0,0,0,.82); backdrop-filter:blur(10px);
  z-index:300; align-items:center; justify-content:center; padding:20px;
}
.overlay.open { display:flex; }
.modal {
  background:var(--ink2); border:1px solid var(--border);
  border-radius:20px; padding:40px; max-width:480px; width:100%;
  position:relative; animation:mIn .28s ease; box-shadow:var(--glow);
}
@keyframes mIn { from{opacity:0;transform:scale(.93) translateY(14px)} to{opacity:1;transform:none} }
.modal-close {
  position:absolute; top:16px; right:20px;
  background:none; border:none; color:var(--muted);
  font-size:22px; cursor:pointer; transition:color .2s;
}
.modal-close:hover { color:var(--text); }
.modal-prop {
  background:rgba(200,184,154,.07); border:1px solid var(--border);
  border-radius:9px; padding:12px 16px; font-size:13px; color:var(--sand);
  margin-bottom:20px; font-weight:500;
}
.form-group { margin-bottom:14px; }
.form-label { display:block; font-size:10px; text-transform:uppercase; letter-spacing:1.5px; color:var(--muted); margin-bottom:7px; }
.form-input, .form-select, .form-textarea {
  width:100%; background:var(--ink3); border:1px solid rgba(255,255,255,.07);
  color:var(--text); padding:11px 14px; border-radius:9px;
  font-family:'DM Sans',sans-serif; font-size:13px; outline:none; transition:border-color .2s;
}
.form-input:focus, .form-select:focus, .form-textarea:focus { border-color:var(--sand); }
.form-input::placeholder, .form-textarea::placeholder { color:var(--muted); }
.form-textarea { min-height:72px; resize:vertical; }
.form-select option { background:var(--ink2); }
.form-row { display:grid; grid-template-columns:1fr 1fr; gap:10px; }
.modal-submit {
  width:100%; background:var(--sand); color:var(--ink);
  border:none; padding:14px; border-radius:10px;
  font-family:'DM Sans',sans-serif; font-size:14px; font-weight:700;
  cursor:pointer; transition:background .2s; margin-top:6px;
}
.modal-submit:hover { background:var(--sand2); }
.success-block { display:none; text-align:center; padding:20px 0; }
.success-block.show { display:block; }
.success-block .big-icon { font-size:56px; margin-bottom:16px; }
.success-block h3 { font-family:'Cormorant Garamond',serif; font-size:26px; margin-bottom:8px; }
.success-block p { color:var(--muted); font-size:14px; line-height:1.7; }

/* ── TOAST ── */
.toast {
  position:fixed; bottom:24px; right:24px;
  background:var(--card); border:1px solid var(--sand);
  border-radius:10px; padding:12px 18px; font-size:13px;
  z-index:999; transform:translateY(60px); opacity:0; pointer-events:none;
  transition:all .3s; max-width:280px;
}
.toast.show { transform:translateY(0); opacity:1; }

/* ── EMPTY ── */
.empty { grid-column:1/-1; text-align:center; padding:70px 20px; color:var(--muted); }
.empty .e-icon { font-size:52px; margin-bottom:14px; }
.empty h3 { font-family:'Cormorant Garamond',serif; font-size:24px; color:var(--text); margin-bottom:8px; }

/* ── FOOTER ── */
footer {
  background:var(--ink2); border-top:1px solid var(--border);
  padding:40px 32px; display:grid;
  grid-template-columns:1fr auto 1fr; gap:32px; align-items:center;
}
.footer-brand { font-family:'Cormorant Garamond',serif; font-size:22px; color:var(--sand); }
.footer-brand small { display:block; font-size:11px; color:var(--muted); letter-spacing:2px; margin-top:3px; font-family:'DM Sans',sans-serif; }
.footer-links { display:flex; gap:20px; justify-content:center; flex-wrap:wrap; }
.footer-links a { color:var(--muted); text-decoration:none; font-size:13px; transition:color .2s; }
.footer-links a:hover { color:var(--sand); }
.footer-contact { text-align:right; font-size:13px; color:var(--muted); line-height:1.9; }
.footer-contact strong { color:var(--text); }

/* ── RESPONSIVE ── */
@media(max-width:900px) {
  .listings-layout { grid-template-columns:1fr; }
  .filters-panel { position:static; }
  .search-panel { grid-template-columns:1fr 1fr; }
  footer { grid-template-columns:1fr; text-align:center; }
  .footer-contact { text-align:center; }
  .header-nav { display:none; }
  .hero h1 { font-size:clamp(36px,10vw,60px); }
}
@media(max-width:600px) {
  .header { padding:0 16px; gap:12px; }
  .section { padding:40px 16px; }
  .search-panel { grid-template-columns:1fr; }
  .cards-grid.list-view .card { flex-direction:column; }
  .cards-grid.list-view .card-img { width:100%; height:200px; }
}
</style>
</head>
<body>

<!-- HEADER -->
<header class="header">
  <div class="logo">ESTA <sub>PMR</sub></div>
  <nav class="header-nav">
    <a href="#listings">Объекты</a>
    <a href="#map-section">Карта</a>
    <a href="#cabinet">Кабинет</a>
    <a href="tel:+37377772473">+373 777 72 473</a>
  </nav>
  <div class="header-spacer"></div>
  <div class="header-search">
    <span style="color:var(--muted);font-size:14px">🔍</span>
    <input type="text" placeholder="Быстрый поиск..." id="headerSearch" oninput="quickSearch(this.value)">
  </div>
  <button class="btn-fav-toggle" onclick="showCabinet('fav')">
    ♡ Избранное
    <span class="fav-count" id="favCount">0</span>
  </button>
</header>

<!-- HERO -->
<div class="hero">
  <div class="hero-bg"></div>
  <div class="hero-noise"></div>
  <div class="hero-content">
    <div class="hero-eyebrow"><span class="hero-dot"></span>Тирасполь · Приднестровье</div>
    <h1>Найдите дом,<br>который <em>ждёт</em> вас</h1>
    <p class="hero-desc">Лучшие объекты недвижимости ПМР. Честные цены, полное сопровождение — от первого звонка до ключей.</p>

    <div class="search-panel">
      <div class="sp-group">
        <label>Тип объекта</label>
        <select class="sp-select" id="spType">
          <option value="">Все типы</option>
          <option value="дом">🏠 Дом</option>
          <option value="квартира">🏢 Квартира</option>
          <option value="участок">🌿 Участок</option>
          <option value="коммерция">🏪 Коммерция</option>
        </select>
      </div>
      <div class="sp-group">
        <label>Район</label>
        <select class="sp-select" id="spDistrict">
          <option value="">Все районы</option>
          <option value="центр">Центр</option>
          <option value="балка">Балка</option>
          <option value="западный">Западный</option>
          <option value="хутор">Ближний Хутор</option>
          <option value="суклея">Суклея</option>
          <option value="кировское">Кировское</option>
        </select>
      </div>
      <div class="sp-group">
        <label>Цена до ($)</label>
        <input class="sp-input" type="number" id="spMaxPrice" placeholder="150 000">
      </div>
      <div class="sp-group">
        <label>Комнат</label>
        <select class="sp-select" id="spRooms">
          <option value="">Любое</option>
          <option value="1">1</option>
          <option value="2">2</option>
          <option value="3">3</option>
          <option value="4">4+</option>
        </select>
      </div>
      <button class="sp-btn" onclick="applyHeroSearch()">Найти</button>
    </div>
  </div>
</div>

<!-- LISTINGS SECTION -->
<div class="page-body">
